name: 🚀 Build LEVIDEX Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: 🏭 Compile Pure Android Release
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Setup Java 17 for Android Gradle
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Download React Native Dependencies
        run: npm install

      - name: 🔐 Generate Native Environment Injection
        run: |
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}" >> .env

      - name: 🏗️ Execute Expo Prebuild (Generate Native Android code)
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Compile Raw .APK via Gradle
        working-directory: android
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --info --stacktrace > gradle_error_dump.txt 2>&1 || true

      - name: 📤 Upload the Final .APK to GitHub Page
        uses: actions/upload-artifact@v4
        with:
          name: COMPILER_ERROR_LOG.txt
          path: android/gradle_error_dump.txt
          retention-days: 7
