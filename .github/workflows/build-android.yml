name: 🚀 Build LEVIDEX Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: 🏭 Compile Android Release (Pre-bundled)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17 for Android Gradle
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔨 Compile .APK via Gradle (JS bundle already embedded)
        working-directory: android
        run: |
          chmod +x ./gradlew
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease

      - name: 📤 Upload the Final .APK to GitHub Page
        uses: actions/upload-artifact@v4
        with:
          name: LEVIDEX_Final_Build.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
